site_name: edge2torch
site_description: >
  Build sparsely connected PyTorch neural networks from
  prior-knowledge graphs, with optional feature- and node-level attribution.
site_url: https://Thomas-Rauter.github.io/edge2torch/
repo_url: https://github.com/Thomas-Rauter/edge2torch
repo_name: Thomas-Rauter/edge2torch

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
    
extra:
  version:
    provider: mike
    default: latest

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting started: getting-started.ipynb
  - Recurrent example: recurrent-example.ipynb
  - GraphNN example: graphnn-example.ipynb
  - Feedforward skip edges: feedforward-skip-edges.ipynb
  - Edge-weight metadata: edge-weight-metadata.ipynb
  - Backends: backends.md
  - Scope and limitations: scope.md
  - API reference: api.md
  - Changelog: changelog.md
  - Citing: citing.md
  - Feedback: feedback.md

plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_root_heading: false
            show_root_toc_entry: false
            show_symbol_type_heading: false
            show_symbol_type_toc: false
            show_signature: true
            show_signature_annotations: true
            separate_signature: true
            line_length: 60
            show_source: false
            merge_init_into_class: true
  - mkdocs-jupyter

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
