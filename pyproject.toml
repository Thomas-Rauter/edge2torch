[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "kpnn"
version = "0.1.0"
description = "Compile prior-knowledge biological graphs into PyTorch models."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
    { name = "Thomas Rauter" }
]
dependencies = [
    "pandas",
    "torch",
    "captum",
]

[project.optional-dependencies]
bio = [
    "anndata",
]
dev = [
    "pytest",
    "ruff",
    "mypy",
    "build",
]
docs = [
    "mkdocs",
    "mkdocs-material",
    "mkdocstrings[python]",
    "mkdocs-jupyter",
    "pymdown-extensions",
    "nbconvert",
    "ipykernel",
    "graphviz",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
namespaces = false

[tool.ruff]
line-length = 80
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.10"
files = ["src"]
ignore_missing_imports = true
