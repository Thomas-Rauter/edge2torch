name: docs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install package and docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]

      - name: Execute documentation notebooks
        run: |
          python -m jupyter nbconvert \
            --to notebook \
            --execute \
            --inplace \
            --ExecutePreprocessor.kernel_name=python3 \
            docs/getting-started.ipynb

          python -m jupyter nbconvert \
            --to notebook \
            --execute \
            --inplace \
            --ExecutePreprocessor.kernel_name=python3 \
            docs/feedforward-skip-edges.ipynb

          python -m jupyter nbconvert \
            --to notebook \
            --execute \
            --inplace \
            --ExecutePreprocessor.kernel_name=python3 \
            docs/edge-weight-metadata.ipynb

          python -m jupyter nbconvert \
            --to notebook \
            --execute \
            --inplace \
            --ExecutePreprocessor.kernel_name=python3 \
            docs/state-update-example.ipynb

      - name: Validate docs build
        run: |
          mkdocs build --strict

      - name: Extract docs version from tag
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          major_minor="$(echo "$version" | cut -d. -f1,2)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "alias=$major_minor" >> "$GITHUB_OUTPUT"

      - name: Deploy versioned docs with mike
        run: |
          version="${{ steps.version.outputs.version }}"
          alias="${{ steps.version.outputs.alias }}"

          # Final releases only: strict X.Y.Z (no rc/beta suffix).
          # Examples: 0.1.0 → updates 0.1 + latest; 0.1.0rc4 → version only.
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            mike deploy --push --update-aliases "$version" "$alias" latest
            mike set-default --push latest
          else
            mike deploy --push "$version"
          fi

      # Google Search Console expects the HTML file at the site root
      # (…/edge2torch/google….html), not under /latest/. mike only deploys
      # versioned trees, so copy the file from docs/ onto gh-pages root.
      - name: Publish Google site verification at docs root
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages
          cp docs/google*.html /tmp/gh-pages/
          cd /tmp/gh-pages
          git add google*.html
          if git diff --cached --quiet; then
            echo "Verification file already up to date."
          else
            git commit -m "Add Google Search Console verification file"
            git push origin HEAD:gh-pages
          fi
