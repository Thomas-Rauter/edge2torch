name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Ruff lint
        run: |
          ruff check .

      - name: Run Ruff format check
        run: |
          ruff format --check .

      - name: Run mypy
        run: |
          mypy src

      - name: Run pytest
        run: |
          pytest

      - name: Build package
        run: |
          python -m build
