name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pytest-cov

      - name: Run Ruff lint
        run: |
          ruff check .

      - name: Run Ruff format check
        run: |
          ruff format --check .

      - name: Run mypy
        run: |
          mypy src

      - name: Run pytest with coverage
        run: |
          pytest \
            --cov=edge2torch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html

      - name: Upload HTML coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: htmlcov
          path: htmlcov/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Thomas-Rauter/edge2torch

      - name: Build package
        run: |
          python -m build

      - name: Check package metadata
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - name: Smoke test installed wheel
        run: |
          python -m venv /tmp/edge2torch-wheel-test
          /tmp/edge2torch-wheel-test/bin/python -m pip install --upgrade pip
          /tmp/edge2torch-wheel-test/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/edge2torch-wheel-test/bin/python - <<'PY'
          import pandas as pd
          import torch

          from edge2torch import (
              CompileArtifact,
              align_features_to_input_nodes,
              compile_graph,
              customize_model,
              interpret_model,
          )

          edgelist = pd.DataFrame(
              {
                  "source": ["feature_a", "feature_b", "hidden"],
                  "target": ["hidden", "hidden", "prediction"],
              }
          )

          model, artifact = compile_graph(
              edgelist,
              backend="feedforward",
              quiet=True,
              bias=False,
          )

          assert isinstance(artifact, CompileArtifact)
          assert artifact.feature_names == ["feature_a", "feature_b"]

          x = torch.ones(2, len(artifact.feature_names))
          y = model(x)

          assert y.shape == (2, 1)
          assert callable(align_features_to_input_nodes)
          assert callable(customize_model)
          assert callable(interpret_model)

          print("installed wheel smoke test passed")
          PY

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install package and docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]

      - name: Execute docs notebooks
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute docs/getting-started.ipynb \
            --inplace

          jupyter nbconvert \
            --to notebook \
            --execute docs/feedforward-skip-edges.ipynb \
            --inplace

          jupyter nbconvert \
            --to notebook \
            --execute docs/edge-weight-metadata.ipynb \
            --inplace

      - name: Build documentation
        run: |
          mkdocs build --strict
