name: Question
description: Ask a usage question about edge2torch.
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your question about `edge2torch`.

        For usage questions, please include enough context to understand your graph, backend, and expected workflow.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: "How do I ..."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the package is your question about?
      options:
        - installation
        - compile_graph
        - feedforward backend
        - recurrent backend
        - graphnn backend
        - feature alignment
        - model customization
        - interpretation / attribution
        - examples / tutorials
        - other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Describe what you are trying to do.
      placeholder: "I have an edge list representing ..., and I want to ..."
    validations:
      required: false

  - type: textarea
    id: edgelist
    attributes:
      label: Example edge list
      description: Paste a small example edge list, if relevant.
      render: csv
      placeholder: |
        source,target
        input_a,hidden_1
        hidden_1,output
    validations:
      required: false

  - type: textarea
    id: code
    attributes:
      label: Code example
      description: Paste relevant code, if any.
      render: python
    validations:
      required: false

  - type: input
    id: edge2torch-version
    attributes:
      label: edge2torch version
      placeholder: "0.1.0"
    validations:
      required: false
